<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>මගේ සංස්කරණ මෘදුකාංගය</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/topbar.css">
    <link rel="stylesheet" href="styles/toolbar.css">
    <link rel="stylesheet" href="styles/canvas.css">
    <link rel="stylesheet" href="styles/panel.css">
</head>
<body>

    
    <!-- ඉහළ මෙනු තීරුව -->

        <div id="topbar"> මෙනු තීරුව (Top Bar) 
            <div id="topbar">
            <div class="menu-item">ගොනුව (File)</div>


           <div class="menu-item">සංස්කරණය
    <ul class="dropdown">
        <li id="canvasSettingsBtn">Canvas Properties</li>
    </ul>
</div>

<div id="canvasModal" class="modal">
    <div class="modal-content">
        <h3>Canvas Properties</h3>
        <label>පළල (Width):</label> <input type="number" id="cWidth" value="800"><br>
        <label>දිග (Height):</label> <input type="number" id="cHeight" value="600"><br>
        <label>පසුබිම් වර්ණය:</label> <input type="color" id="cColor" value="#ffffff"><br><br>
        
        <label>ප්‍රමාණය තෝරන්න:</label>
        <select id="presetSelect">
            <option value="custom">Custom</option>
            <option value="youtube">YouTube Thumbnail (1280x720)</option>
            <option value="fb">FB Post (1080x1080)</option>
            <option value="a5">A5 Landscape (835x595)</option>
        </select>
        <br><br>
        <button id="applyBtn">Apply</button>
        <button id="closeBtn">Close</button>
    </div>
</div>
                 


            <div class="menu-item">අනුරූප (Image)</div>
            <div class="menu-item">ස්ථර (Layer)</div>
            <div class="menu-item">සහාය (Help)</div>
            </div> 
        </div> 

    <div class="main-container">
    <div id="toolbar" class="toolbar-section"> 
        <div class="tool-header">ටූල්ස්</div>
        
        <div class="tool-icon">M</div> 
        <div class="tool-icon">S</div> 
        <div class="tool-icon">T</div> 
        <div class="tool-icon">B</div>
        
        <div id="toolBox">
            <button id="brushBtn" class="tool-icon">Brush</button>
        </div>
    </div> 



        <!-- මැද කැන්වස් -->
        <div id="canvas" class="canvas-section"> වැඩබිම </div>

        <!-- දකුණු පස පැනල් -->
        <div id="panel" class="panel-section">
             <div class="panel-title">Layers</div>
    
             <div class="layer-item">Layer 1</div>
             <div class="layer-item">Background</div>
        </div>
    </div>


    <script src="js/fabric.min.js"></script>

    <script type="module" src="main.js"></script>
    
</body>
</html>
